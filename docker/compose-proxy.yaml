services:
  armada-proxy:
    build:
      context: ..
      dockerfile: src/Armada.Proxy/Dockerfile
    ports:
      - "7893:7893"
    environment:
      - ARMADA_PROXY_SETTINGS_FILE=/config/proxysettings.json
    volumes:
      - ./proxy/proxysettings.json:/config/proxysettings.json:ro
      - ./proxy/data:/app/data
      - ./proxy/logs:/app/data/logs
